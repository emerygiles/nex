<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6D28D9"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#71717A"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="#FAFAFB"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#101013">NEX — Autonomous Purple-Team for Splunk</text>
  <text x="40" y="70" font-size="14" fill="#71717A">Architecture &amp; data flow: how NEX interacts with Splunk and integrates the AI agent</text>

  <!-- FRONTEND -->
  <rect x="40" y="110" width="230" height="430" rx="14" fill="#FFFFFF" stroke="#E9E9EE"/>
  <text x="60" y="138" font-size="12" font-weight="700" fill="#6D28D9" letter-spacing="1">FRONTEND · React + Vite</text>
  <g font-size="13" fill="#3F3F46">
    <rect x="60" y="152" width="190" height="40" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/><text x="74" y="177">Coverage dashboard</text>
    <rect x="60" y="200" width="190" height="40" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/><text x="74" y="225">ATT&amp;CK graph (React Flow)</text>
    <rect x="60" y="248" width="190" height="40" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/><text x="74" y="273">Agent activity (SSE stream)</text>
    <rect x="60" y="296" width="190" height="40" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/><text x="74" y="321">Surface · Detections views</text>
    <rect x="60" y="344" width="190" height="40" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/><text x="74" y="369">Authored detection (SPL+Sigma)</text>
  </g>
  <text x="60" y="430" font-size="12" fill="#A1A1AA">React Query · Framer Motion</text>

  <!-- BACKEND -->
  <rect x="350" y="110" width="270" height="430" rx="14" fill="#FFFFFF" stroke="#E9E9EE"/>
  <text x="370" y="138" font-size="12" font-weight="700" fill="#6D28D9" letter-spacing="1">BACKEND · Python + FastAPI</text>
  <rect x="370" y="152" width="230" height="150" rx="10" fill="#0B0B0F"/>
  <text x="386" y="176" font-size="12" font-weight="700" fill="#C9D1E4">Agent loop</text>
  <g font-size="12" fill="#9aa6bd">
    <text x="386" y="200">1 · recon</text>
    <text x="386" y="220">2 · attack-think</text>
    <text x="386" y="240">3 · prove (grounded)</text>
    <text x="386" y="260">4 · skeptic gate</text>
    <text x="386" y="280">5 · ship + deploy</text>
  </g>
  <rect x="370" y="316" width="230" height="44" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/>
  <text x="386" y="343" font-size="13" fill="#3F3F46">Tool layer (6 tools)</text>
  <rect x="370" y="372" width="230" height="44" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/>
  <text x="386" y="399" font-size="13" fill="#3F3F46">Model client + grounding guards</text>
  <rect x="370" y="428" width="230" height="44" rx="8" fill="#F6F4FE" stroke="#DDD6FE"/>
  <text x="386" y="455" font-size="13" fill="#3F3F46">Data-plane switch (3 modes)</text>
  <text x="370" y="500" font-size="11" fill="#A1A1AA">SSE · safety net · /health /coverage /run /reset</text>

  <!-- AI BRAIN -->
  <rect x="700" y="110" width="260" height="190" rx="14" fill="#FFFFFF" stroke="#E9E9EE"/>
  <text x="720" y="138" font-size="12" font-weight="700" fill="#6D28D9" letter-spacing="1">AI BRAIN · local</text>
  <rect x="720" y="152" width="220" height="120" rx="10" fill="#F6F4FE" stroke="#DDD6FE"/>
  <text x="734" y="180" font-size="14" font-weight="700" fill="#101013">Foundation-Sec-8B</text>
  <text x="734" y="202" font-size="12" fill="#3F3F46">security-tuned LLM (Cisco)</text>
  <text x="734" y="224" font-size="12" fill="#3F3F46">via Ollama · OpenAI-compatible</text>
  <text x="734" y="252" font-size="12" fill="#71717A">picks TTP · writes SPL+Sigma · skeptic</text>

  <!-- SPLUNK -->
  <rect x="700" y="330" width="260" height="210" rx="14" fill="#15212B" stroke="#0B0B0F"/>
  <text x="720" y="358" font-size="12" font-weight="700" fill="#FF6A00" letter-spacing="1">SPLUNK ENTERPRISE</text>
  <rect x="720" y="372" width="220" height="38" rx="8" fill="#1d2d3a"/><text x="734" y="396" font-size="12" fill="#dfe7ef">MCP Server / REST API (:8089)</text>
  <rect x="720" y="416" width="220" height="38" rx="8" fill="#1d2d3a"/><text x="734" y="440" font-size="12" fill="#dfe7ef">Indexes · sourcetypes (telemetry)</text>
  <rect x="720" y="460" width="220" height="38" rx="8" fill="#1d2d3a"/><text x="734" y="484" font-size="12" fill="#dfe7ef">Saved-search detections</text>
  <text x="720" y="520" font-size="11" fill="#7d8b9a">sandbox mode → in-process mock MCP</text>

  <!-- FLOWS -->
  <line x1="270" y1="290" x2="350" y2="290" stroke="#6D28D9" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="320" x2="270" y2="320" stroke="#71717A" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="276" y="282" font-size="11" fill="#6D28D9">run</text>
  <text x="276" y="338" font-size="11" fill="#71717A">SSE events</text>

  <line x1="620" y1="210" x2="700" y2="210" stroke="#6D28D9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="624" y="202" font-size="11" fill="#6D28D9">reason / author</text>

  <line x1="620" y1="420" x2="700" y2="420" stroke="#6D28D9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="624" y="412" font-size="11" fill="#6D28D9">enumerate · search · deploy</text>
  <line x1="700" y1="450" x2="620" y2="450" stroke="#71717A" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="624" y="468" font-size="11" fill="#71717A">hits · coverage</text>
</svg>
